<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240">
  <defs>
    <linearGradient id="cylBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.5" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <clipPath id="lensClip">
      <circle cx="187" cy="163" r="30"/>
    </clipPath>
  </defs>

  <!-- ===== database cylinder ===== -->
  <g>
    <!-- body -->
    <path d="M 42 48 L 42 172 A 76 24 0 0 0 194 172 L 194 48 Z" fill="url(#cylBody)"/>
    <!-- band separators -->
    <path d="M 42 88 A 76 24 0 0 0 194 88" fill="none" stroke="#ffffff" stroke-width="5"/>
    <path d="M 42 130 A 76 24 0 0 0 194 130" fill="none" stroke="#ffffff" stroke-width="5"/>
    <!-- top face -->
    <ellipse cx="118" cy="48" rx="76" ry="24" fill="#2563eb" stroke="#ffffff" stroke-width="5"/>
    <ellipse cx="118" cy="48" rx="60" ry="17" fill="#1d4ed8"/>
  </g>

  <!-- binary digits -->
  <g font-family="Consolas,'Courier New',monospace" font-size="17" font-weight="700">
    <text x="66" y="112"><tspan fill="#ffffff">01 </tspan><tspan fill="#f87171">10</tspan><tspan fill="#ffffff"> 11 11</tspan></text>
    <text x="66" y="152"><tspan fill="#f87171">11</tspan><tspan fill="#ffffff"> 01 10 </tspan><tspan fill="#f87171">01</tspan></text>
    <text x="66" y="172"><tspan fill="#ffffff">10 01 </tspan><tspan fill="#f87171">01</tspan></text>
  </g>

  <!-- ===== hexagon cluster (left) ===== -->
  <g stroke-linejoin="round">
    <path d="M 38 60 l 11 6.5 v 13 l -11 6.5 l -11 -6.5 v -13 Z" fill="#dc2626"/>
    <path d="M 64 74 l 9 5.2 v 10.4 l -9 5.2 l -9 -5.2 v -10.4 Z" fill="#3b82f6"/>
    <path d="M 24 92 l 12 7 v 14 l -12 7 l -12 -7 v -14 Z" fill="#1d4ed8"/>
    <path d="M 50 104 l 9 5.2 v 10.4 l -9 5.2 l -9 -5.2 v -10.4 Z" fill="#60a5fa"/>
    <path d="M 20 132 l 9 5.2 v 10.4 l -9 5.2 l -9 -5.2 v -10.4 Z" fill="#3b82f6"/>
    <path d="M 42 142 l 11 6.5 v 13 l -11 6.5 l -11 -6.5 v -13 Z" fill="#dc2626"/>
    <path d="M 22 170 l 8 4.6 v 9.2 l -8 4.6 l -8 -4.6 v -9.2 Z" fill="#1d4ed8"/>
    <path d="M 46 182 l 9 5.2 v 10.4 l -9 5.2 l -9 -5.2 v -10.4 Z" fill="#2563eb"/>
    <path d="M 70 196 l 7 4 v 8 l -7 4 l -7 -4 v -8 Z" fill="#93c5fd"/>
  </g>

  <!-- ===== magnifying glass ===== -->
  <g>
    <!-- handle -->
    <rect x="212" y="188" width="40" height="15" rx="7.5" transform="rotate(38 212 188)" fill="#1e3a8a"/>
    <!-- lens -->
    <circle cx="187" cy="163" r="34" fill="#ffffff" stroke="#1e3a8a" stroke-width="9"/>
    <!-- cell grid inside lens -->
    <g clip-path="url(#lensClip)">
      <g>
        <rect x="168" y="146" width="11" height="11" rx="2" fill="#dc2626"/>
        <rect x="182" y="146" width="11" height="11" rx="2" fill="#1d4ed8"/>
        <rect x="196" y="146" width="11" height="11" rx="2" fill="#1d4ed8"/>
        <rect x="168" y="160" width="11" height="11" rx="2" fill="#1d4ed8"/>
        <rect x="182" y="160" width="11" height="11" rx="2" fill="#dc2626"/>
        <rect x="196" y="160" width="11" height="11" rx="2" fill="#60a5fa"/>
        <rect x="168" y="174" width="11" height="11" rx="2" fill="#60a5fa"/>
        <rect x="182" y="174" width="11" height="11" rx="2" fill="#1d4ed8"/>
        <rect x="196" y="174" width="11" height="11" rx="2" fill="#dc2626"/>
      </g>
    </g>
    <!-- recovery arrow around lens -->
    <path d="M 187 122 A 41 41 0 0 0 146 163" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>
    <path d="M 146 163 l -8 -12 h 16 Z" fill="#dc2626"/>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="240" y="168" font-family="'Nunito','Arial Rounded MT Bold','Segoe UI',Arial,sans-serif" font-size="118" font-weight="800" letter-spacing="-2">
    <tspan fill="#1f2937">dm</tspan><tspan fill="#1d4ed8">dul</tspan>
  </text>
</svg>
